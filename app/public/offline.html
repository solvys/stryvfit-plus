<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070E13" />
    <title>StryvFit+ Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070E13;
        --surface: #0A0A0A;
        --gold: #F24F09;
        --text: #FFFFFF;
        --muted: #B8B8B8;
        --border: #262626;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid rgba(242, 79, 9, 0.18);
        background: rgba(10, 10, 10, 0.86);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      img {
        width: 64px;
        height: 64px;
        display: block;
        margin-bottom: 24px;
      }

      p:first-of-type {
        margin: 0 0 10px;
        color: var(--gold);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 14vw, 56px);
        line-height: 0.95;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 16px;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        background: var(--gold);
        color: var(--bg);
        padding: 0 18px;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.12em;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <p>StryvFit+ Offline</p>
      <h1>Reconnect to keep training.</h1>
      <p>
        Your installed app is ready, but booking, coach messages, and live notes
        need a connection. Check your signal and try again.
      </p>
      <a href="/book">Retry booking</a>
    </main>
  </body>
</html>
