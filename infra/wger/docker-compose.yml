services:
  caddy:
    image: docker.io/caddy:2-alpine
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      WGER_HOSTNAME: ${WGER_HOSTNAME:-workouts.stryvsocietyfit.com}
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  web:
    image: docker.io/wger/server:latest
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    volumes:
      - static:/home/wger/static
      - media:/home/wger/media
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      start_period: 300s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "5"
    restart: unless-stopped

  nginx:
    image: docker.io/nginx:stable
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/wger/static:ro
      - media:/wger/media:ro
    expose:
      - 80
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db:
    image: docker.io/postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wger}
      POSTGRES_DB: ${POSTGRES_DB:-wger}
      TZ: ${TZ:-America/New_York}
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    expose:
      - 5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wger"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "5"
    restart: unless-stopped

  cache:
    image: docker.io/redis:7-alpine
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "5"
    restart: unless-stopped

  celery_worker:
    image: docker.io/wger/server:latest
    command: /start-worker
    env_file:
      - ./config/prod.env
    volumes:
      - media:/home/wger/media
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "5"
    restart: unless-stopped

  celery_beat:
    image: docker.io/wger/server:latest
    command: /start-beat
    env_file:
      - ./config/prod.env
    volumes:
      - celery-beat:/home/wger/beat/
    depends_on:
      celery_worker:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "5"
    restart: unless-stopped

volumes:
  postgres-data:
    name: stryv-wger-postgres-data
  redis-data:
    name: stryv-wger-redis-data
  celery-beat:
    name: stryv-wger-celery-beat
  media:
    name: stryv-wger-media
  static:
    name: stryv-wger-static
  caddy-data:
    name: stryv-wger-caddy-data
  caddy-config:
    name: stryv-wger-caddy-config

networks:
  default:
    name: stryv_wger_network
